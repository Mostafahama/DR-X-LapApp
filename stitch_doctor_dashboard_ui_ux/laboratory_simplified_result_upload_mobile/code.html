<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;family=Cairo:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface": "#f7f9fb",
                    "outline-variant": "#c2c6d8",
                    "error": "#ba1a1a",
                    "on-primary-container": "#f8f7ff",
                    "surface-container-low": "#f2f4f6",
                    "outline": "#727687",
                    "on-tertiary-container": "#e1ffec",
                    "surface-tint": "#0054d6",
                    "on-primary-fixed": "#001849",
                    "on-tertiary-fixed": "#002113",
                    "tertiary-fixed": "#6ffbbe",
                    "inverse-surface": "#2d3133",
                    "on-secondary-fixed-variant": "#3a485b",
                    "on-secondary": "#ffffff",
                    "inverse-on-surface": "#eff1f3",
                    "primary": "#0050cb",
                    "on-primary": "#ffffff",
                    "on-error-container": "#93000a",
                    "primary-fixed-dim": "#b3c5ff",
                    "on-primary-fixed-variant": "#003fa4",
                    "on-background": "#191c1e",
                    "tertiary": "#006645",
                    "on-surface": "#191c1e",
                    "tertiary-container": "#008259",
                    "secondary-fixed-dim": "#b9c7df",
                    "surface-variant": "#e0e3e5",
                    "secondary": "#515f74",
                    "on-secondary-container": "#57657a",
                    "on-tertiary": "#ffffff",
                    "on-error": "#ffffff",
                    "primary-container": "#0066ff",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-fixed-variant": "#005236",
                    "on-secondary-fixed": "#0d1c2e",
                    "surface-container-high": "#e6e8ea",
                    "inverse-primary": "#b3c5ff",
                    "background": "#f7f9fb",
                    "surface-dim": "#d8dadc",
                    "surface-container-highest": "#e0e3e5",
                    "surface-bright": "#f7f9fb",
                    "error-container": "#ffdad6",
                    "tertiary-fixed-dim": "#4edea3",
                    "primary-fixed": "#dae1ff",
                    "secondary-container": "#d5e3fc",
                    "surface-container": "#eceef0",
                    "on-surface-variant": "#424656",
                    "secondary-fixed": "#d5e3fc"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.375rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "display": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .liquid-glass {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            border-left: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.4), 0 16px 32px -16px rgba(25, 28, 30, 0.06);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary/20">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/60 dark:bg-slate-900/60 backdrop-blur-xl shadow-[0_4px_32px_rgba(25,28,30,0.04)] flex justify-between items-center px-6 h-16 w-full">
<div class="flex items-center gap-4"><button aria-label="Go back" class="w-11 h-11 flex items-center justify-center -ml-2 rounded-full hover:bg-slate-100 transition-colors text-slate-700">
<span class="material-symbols-outlined text-2xl">chevron_left</span>
</button>
<h1 class="font-inter tracking-tight font-semibold text-lg text-slate-900" style="">Upload Result</h1>
</div>
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-primary-container flex items-center justify-center text-[10px] font-bold text-white overflow-hidden shadow-sm">
<img class="w-full h-full object-cover" data-alt="Modern Labs Logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCDRIz-1yTkjIGxFj2I5cZR77S4VRoBc5lBoVwEO6VqzOskHHiNKhPUqderdHp4SSl21gFYI_FUiVpcjEvdUlfTV1FsMC2NzpzuNd9A8z-zggB37VLP7oCyItH004Y-UO2aZ_pKO4cMGyqOWfirD-sXpPYeerW5djoxVBZOCQpVl9PAXMJm7rQpk6p5JgWt6e7WpK0lQdzQFzRO9z3j0mcV-nyADfE4nmgzxrOOQHpOfBucdI4pXPM4Uq2qQKXWetIGjZkZexhAqB5z" style=""/>
</div>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-md mx-auto">
<!-- Patient Context Header -->
<section class="mb-8 relative">
<div class="absolute -top-4 -left-4 w-24 h-24 bg-primary/5 rounded-full blur-3xl"></div>
<p class="text-[10px] font-bold uppercase tracking-widest text-primary mb-1" style="">Current Task</p>
<h2 class="text-2xl font-bold tracking-tight text-on-surface" style="">Sarah Ahmed</h2>
<div class="flex items-center gap-2 mt-1">
<span class="material-symbols-outlined text-sm text-outline" style="">biotech</span>
<span class="text-sm font-medium text-on-secondary-fixed-variant" style="">Lipid Profile</span>
</div>
</section>
<!-- Structured Values Section -->
<section class="mb-10">
<div class="flex items-center justify-between mb-4">
<h3 class="text-xs font-bold uppercase tracking-widest text-outline" style="">Structured Values</h3>
<span class="px-2 py-0.5 rounded-full bg-tertiary/10 text-tertiary text-[10px] font-bold" style="">Manual Entry</span>
</div>
<div class="space-y-4">
<!-- Clinical Notes & Observations -->
<div class="liquid-glass p-4 rounded-xl">
<div class="flex justify-between items-baseline mb-2">
<label class="text-sm font-semibold text-on-surface" style="">Laboratory Notes &amp; Observations</label>
</div>
<div class="relative">
<textarea class="w-full bg-surface-container-low border-none rounded-lg py-3 px-4 text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary/20 transition-all font-medium min-h-[120px] resize-none" placeholder="Enter clinical observations, findings, or additional context here..."></textarea>
</div>
</div>
</div>
</section>
<!-- File Upload Section -->
<section class="mb-12">
<h3 class="text-xs font-bold uppercase tracking-widest text-outline mb-4" style="">File Upload</h3>
<div class="relative group cursor-pointer">
<div class="absolute inset-0 bg-primary/5 rounded-2xl blur-lg transition-all group-hover:bg-primary/10"></div>
<div class="relative border-2 border-dashed border-outline-variant/30 rounded-2xl p-8 bg-white/40 backdrop-blur-md flex flex-col items-center justify-center text-center transition-all hover:bg-white/60">
<div class="w-14 h-14 bg-primary/10 rounded-full flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-3xl text-primary" data-weight="fill" style='font-variation-settings: "FILL" 1;'>cloud_upload</span>
</div>
<h4 class="text-on-surface font-bold text-base" style="">Upload PDF or Scanned Report</h4>
<p class="text-outline text-xs mt-1 max-w-[200px]" style="">Ensure the patient name and ID are clearly visible in the document</p>
</div>
</div>
</section>
<!-- Status Actions -->
<div class="flex flex-col gap-3">
<button class="w-full py-4 rounded-xl bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold shadow-lg shadow-primary/20 flex items-center justify-center gap-2 active:scale-95 duration-150" style="">
                Submit Results
                <span class="material-symbols-outlined text-lg" style="">check_circle</span>
</button>
<div class="grid grid-cols-2 gap-3">
<button class="py-3.5 rounded-xl border border-primary/20 text-primary font-bold text-sm bg-white/50 backdrop-blur-sm hover:bg-primary/5 transition-all flex items-center justify-center gap-2" style="">
<span class="material-symbols-outlined text-sm" style="">save</span>
                    Save Draft
                </button>
<button class="py-3.5 rounded-xl bg-secondary-container/50 text-on-secondary-container font-bold text-sm hover:bg-secondary-container transition-all flex items-center justify-center gap-2" style="">
<span class="material-symbols-outlined text-sm" style="">assignment_turned_in</span>
                    Mark Ready
                </button>
</div>
</div>
</main>
<!-- BottomNavBar (Dimmed/Suppressed State) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full flex justify-around items-center px-4 py-3 pb-safe bg-white/70 dark:bg-slate-900/70 backdrop-blur-lg border-t border-white/20 shadow-[0_-8px_32px_rgba(0,0,0,0.05)] z-50">
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-blue-500 active:scale-90 transition-transform" href="#" style="">
<span class="material-symbols-outlined" style="">assignment</span>
<span class="font-inter text-[10px] uppercase tracking-widest font-bold" style="">Requests</span>
</a>
<a class="flex flex-col items-center justify-center bg-blue-600/10 text-blue-700 dark:text-blue-300 rounded-xl px-4 py-1 active:scale-90 transition-transform" href="#" style="">
<span class="material-symbols-outlined" style='font-variation-settings: "FILL" 1;'>analytics</span>
<span class="font-inter text-[10px] uppercase tracking-widest font-bold" style="">Results</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-blue-500 active:scale-90 transition-transform" href="#" style="">
<span class="material-symbols-outlined" style="">chat_bubble</span>
<span class="font-inter text-[10px] uppercase tracking-widest font-bold" style="">Chat</span>
</a>
</nav>
<!-- Decorative Liquid Background Element -->
<div class="fixed top-1/2 right-0 -translate-y-1/2 w-64 h-64 bg-primary-container/10 rounded-full blur-[100px] pointer-events-none -z-10"></div>
</body></html>
